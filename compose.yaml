services:
  db:
    image: postgres:16-alpine
    container_name: ai_startup_db
    environment:
      POSTGRES_DB: ai_startup
      POSTGRES_USER: ai_startup
      POSTGRES_PASSWORD: ai_startup
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_startup -d ai_startup"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: ai_startup_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
